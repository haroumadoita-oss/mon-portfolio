<!DOCTYPE html>
<html>
<head>
<title>Cyber Portfolio</title>

<style>
body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: #020617;
    color: #3b82f6;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    border-bottom: 1px solid #3b82f6;
    align-items: center;
}

.logo {
    font-weight: bold;
}

/* MENU TOP */
.top-menu a {
    margin: 0 10px;
    cursor: pointer;
}

/* RIGHT */
.right-menu {
    display: flex;
    align-items: center;
}

.lang button {
    background: transparent;
    border: 1px solid #3b82f6;
    color: #3b82f6;
    margin-right: 10px;
    padding: 5px 10px;
    cursor: pointer;
}

/* MENU 3 POINTS */
.menu-btn {
    font-size: 25px;
    cursor: pointer;
}

/* DROPDOWN */
.dropdown {
    position: absolute;
    top: 70px;
    right: 20px;
    background: #020617;
    border: 1px solid #3b82f6;
    display: none;
    flex-direction: column;
}

.dropdown a {
    padding: 10px 20px;
    cursor: pointer;
}

.dropdown a:hover {
    background: #3b82f6;
    color: black;
}

/* HERO */
.hero {
    padding: 50px;
    min-height: 100vh;

    background-image: linear-gradient(#3b82f622 1px, transparent 1px),
                      linear-gradient(90deg, #3b82f622 1px, transparent 1px);
    background-size: 40px 40px;
}

h1 {
    font-size: 45px;
}

.highlight {
    color: #3b82f6;
}

.white {
    color: white;
}

.desc {
    color: #94a3b8;
    margin-top: 20px;
}

/* BUTTONS */
.buttons {
    margin-top: 30px;
}

.btn {
    padding: 15px 25px;
    margin-right: 10px;
    cursor: pointer;
}

.primary {
    background: #3b82f6;
    color: black;
}

.secondary {
    border: 1px solid #3b82f6;
    color: #3b82f6;
    background: transparent;
}

/* IMAGE */
.profile {
    margin-top: 50px;
}

.profile img {
    width: 150px;
    border-radius: 50%;
    border: 2px solid #3b82f6;
    box-shadow: 0 0 20px #3b82f6;
}
</style>

<script>
function toggleMenu() {
    let menu = document.getElementById("dropdown");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}

function showSection(id) {
    let sections = document.querySelectorAll(".hero");
    sections.forEach(sec => sec.style.display = "none");

    document.getElementById(id).style.display = "block";

    document.getElementById("dropdown").style.display = "none";
}

/* TRANSLATE */
function setLanguage(lang) {

    if (lang === "fr") {

        document.getElementById("title").innerHTML =
        "Salut, je suis <span class='highlight'>Haroum Abdoulkader</span><br><span class='white'>Ingénieur IA</span>";

        document.getElementById("desc").innerHTML =
        "Ingénieur en Intelligence Artificielle basé à Djibouti";

        document.getElementById("about").innerHTML =
        "Passionné par l’intelligence artificielle et les systèmes intelligents.";

        document.getElementById("skills").innerHTML =
        "Python, Machine Learning, Intelligence Artificielle";

        document.getElementById("projects").innerHTML =
        "Projet IA 1, Projet IA 2";

        document.getElementById("contact").innerHTML =
        "Email: haroumadoita@gmail.com";

    } else {

        document.getElementById("title").innerHTML =
        "Hi, I'm <span class='highlight'>Haroum Abdoulkader</span><br><span class='white'>AI Engineer</span>";

        document.getElementById("desc").innerHTML =
        "AI Engineer based in Djibouti";

        document.getElementById("about").innerHTML =
        "Passionate about artificial intelligence and intelligent systems.";

        document.getElementById("skills").innerHTML =
        "Python, Machine Learning, Artificial Intelligence";

        document.getElementById("projects").innerHTML =
        "AI Project 1, AI Project 2";

        document.getElementById("contact").innerHTML =
        "Email: haroumadoita@gmail.com";
    }
}

/* LOAD HOME */
window.onload = function() {
    let sections = document.querySelectorAll(".hero");
    sections.forEach(sec => sec.style.display = "none");

    document.getElementById("home").style.display = "block";
}
</script>

</head>

<body>

<div class="navbar">
    <div class="logo">AAM_</div>

    <!-- MENU HAUT -->
    <div class="top-menu">
        <a onclick="showSection('home')">Home</a>
        <a onclick="showSection('about')">About</a>
        <a onclick="showSection('skills')">Skills</a>
        <a onclick="showSection('projects')">Projects</a>
        <a onclick="showSection('contact')">Contact</a>
    </div>

    <div class="right-menu">
        <div class="lang">
            <button onclick="setLanguage('fr')">FR</button>
            <button onclick="setLanguage('en')">EN</button>
        </div>

        <div class="menu-btn" onclick="toggleMenu()">⋮</div>
    </div>
</div>

<!-- MENU 3 POINTS -->
<div id="dropdown" class="dropdown">
    <a onclick="showSection('home')">Home</a>
    <a onclick="showSection('about')">About</a>
    <a onclick="showSection('skills')">Skills</a>
    <a onclick="showSection('projects')">Projects</a>
    <a onclick="showSection('contact')">Contact</a>
</div>

<!-- HOME -->
<div id="home" class="hero">
    <h1 id="title">
        Hi, I'm <span class="highlight">Haroum Abdoulkader</span><br>
        <span class="white">AI Engineer</span>
    </h1>

    <p id="desc">
        AI Engineer based in Djibouti
    </p>

    <div class="profile">
        <img src="d750c891-f83e-4567-a22f-fa1bd6e1d724.jpg">
    </div>
</div>

<!-- ABOUT -->
<div id="about" class="hero">
    Passionate about AI.
</div>

<!-- SKILLS -->
<div id="skills" class="hero">
    Python, Machine Learning, AI
</div>

<!-- PROJECTS -->
<div id="projects" class="hero">
    Project 1, Project 2
</div>

<!-- CONTACT -->
<div id="contact" class="hero">
    Email: haroumadoita@gmail.com
</div>

</body>
</html>
