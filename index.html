<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Portfolio</title>

<style>
/* TON CSS INCHANGÉ */
body { margin:0; font-family:'Courier New', monospace; background:#020617; color:#00bfff; }
.navbar { display:flex; justify-content:space-between; padding:20px; border-bottom:1px solid #00bfff; align-items:center; position:relative; }
.logo { font-weight:bold; }
.right-menu { display:flex; align-items:center; margin-left:auto; }
.lang { display:flex; align-items:center; }
.lang button { background:transparent; border:1px solid #00bfff; color:#00bfff; margin-right:10px; padding:5px 10px; cursor:pointer; }
.menu-btn { font-size:30px; cursor:pointer; }
.dropdown { position:absolute; top:70px; right:20px; background:#020617; border:1px solid #00bfff; display:none; flex-direction:column; z-index:9999; min-width:150px; }
.dropdown a { padding:10px 20px; cursor:pointer; }
.dropdown a:hover { background:#00bfff; color:black; }
.hero { padding:20px; min-height:100vh; text-align:center; background-image: linear-gradient(#00bfff22 1px, transparent 1px), linear-gradient(90deg, #00bfff22 1px, transparent 1px); background-size:40px 40px; }
h1 { font-size:12vw; line-height:1.05; }
.highlight { color:#00bfff; }
.white { color:white; }
.desc { color:#94a3b8; margin-top:20px; font-size:4vw; }
.buttons { margin-top:30px; }
.btn { padding:15px 25px; margin-right:10px; cursor:pointer; font-size:3.5vw; }
.primary { background:#00bfff; color:black; }
.secondary { border:1px solid #00bfff; color:#00bfff; background:transparent; }
.profile-card { margin:40px auto; padding:20px; max-width:700px; display:flex; flex-direction:column; align-items:center; gap:20px; border:1px solid #00bfff; border-radius:15px; }
.profile-img { width:150px; border-radius:50%; border:2px solid #00bfff; box-shadow:0 0 20px #00bfff; }
.profile-text { text-align:center; color:#94a3b8; }
.read-more-box { border:1px solid white; background:white; color:black; display:inline-block; padding:8px 12px; margin-top:10px; cursor:pointer; font-size:12px; }
.hidden { display:none; }
.education-card { max-width:800px; margin:30px auto; padding:20px; border:1px solid #00bfff; border-radius:15px; box-shadow:0 0 15px #00bfff33; }
.edu-item { margin-bottom:25px; padding:15px; border-left:4px solid #00bfff; }
.edu-title { font-size:18px; color:white; font-weight:bold; }
.edu-date { font-size:14px; color:#94a3b8; }
.skills-container { max-width:800px; margin:30px auto; display:flex; flex-wrap:wrap; gap:10px; }
.skill-btn { padding:10px 15px; border:1px solid #00bfff; border-radius:20px; background:transparent; color:#00bfff; cursor:pointer; transition:0.3s; }
.skill-btn:hover { background:#00bfff; color:black; box-shadow:0 0 10px #00bfff; }
.lang-container { max-width:800px; margin:30px auto; display:flex; flex-wrap:wrap; gap:10px; }
.lang-box { padding:10px 15px; border-radius:20px; border:1px solid white; background:white; color:black; font-size:14px; }
@media(min-width:768px){ h1{font-size:90px;} .desc{font-size:18px;} .btn{font-size:16px;} }
#contact input,#contact textarea{ display:block; width:100%; margin-top:12px; }
.send-btn{ margin-top:15px; padding:12px; background:#00bfff; color:black; border:none; cursor:pointer; width:100%; }
</style>

<script>
// ✅ MENU FIX
function toggleMenu(event){
    event.stopPropagation();
    const menu = document.getElementById("dropdown");

    if(menu.style.display === "block"){
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}

// fermer si clique ailleurs
document.addEventListener("click", function(){
    const menu = document.getElementById("dropdown");
    if(menu){
        menu.style.display = "none";
    }
});

function scrollToSection(id){
    document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function toggleReadMore(id){
    let el = document.getElementById(id);
    el.style.display = (el.style.display === "block") ? "none" : "block";
}


// 🌍 TRADUCTION CLEAN
function setLanguage(lang){

    if(lang === "FR"){

        document.querySelector(".desc").innerHTML =
        "Ingénieur IA & Développeur<br>Spécialisé en IA et Machine Learning<br>Basé à Djibouti – Ouvert aux opportunités";

        document.querySelector("#about h2").innerText = "🏆 Expériences & Réalisations";
        document.querySelector("#skills h2").innerText = "⚡ Compétences";
        document.querySelector("#languages h2").innerText = "🌍 Langues";
        document.querySelector("#education h2").innerText = "🎓 Éducation";
        document.querySelector("#contact h2").innerText = "Contact";

        document.querySelector(".primary").innerText = "Télécharger CV";
        document.querySelector(".secondary").innerText = "Projets";

    } else {

        document.querySelector(".desc").innerHTML =
        "AI Engineer & Developer<br>Specializing in AI, Machine Learning<br>Based in Djibouti – Open to work";

        document.querySelector("#about h2").innerText = "🏆 Achievements & Experience";
        document.querySelector("#skills h2").innerText = "⚡ Skills";
        document.querySelector("#languages h2").innerText = "🌍 Languages";
        document.querySelector("#education h2").innerText = "🎓 Education";
        document.querySelector("#contact h2").innerText = "Contact";

        document.querySelector(".primary").innerText = "Download CV";
        document.querySelector(".secondary").innerText = "Projects";
    }
}


// 📩 EMAIL OK
function sendEmail(){
    let name = document.querySelector('input[type="text"]').value;
    let email = document.querySelector('input[type="email"]').value;
    let message = document.querySelector('textarea').value;

    let link = `mailto:haroumadoita@gmail.com?subject=Message from ${name}&body=Email: ${email}%0D%0A%0D%0A${message}`;
    window.location.href = link;
}
</script>

</head>
