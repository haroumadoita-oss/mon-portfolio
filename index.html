<!DOCTYPE html>
<html>
<head>
<title>Cyber Portfolio</title>

<style>
body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: #020617;
    color: #00ff9f;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    border-bottom: 1px solid #00ff9f;
}

.logo {
    font-weight: bold;
    font-size: 20px;
}

.lang button {
    background: transparent;
    border: 1px solid #00ff9f;
    color: #00ff9f;
    padding: 5px 10px;
    cursor: pointer;
}

/* GRID BACKGROUND */
.hero {
    padding: 50px;
    background-image: linear-gradient(#00ff9f22 1px, transparent 1px),
                      linear-gradient(90deg, #00ff9f22 1px, transparent 1px);
    background-size: 40px 40px;
}

/* TITLE */
h1 {
    font-size: 50px;
    line-height: 1.2;
}

.highlight {
    color: #00ff9f;
}

.white {
    color: white;
}

/* TEXT */
.desc {
    color: #94a3b8;
    margin-top: 20px;
}

/* BUTTONS */
.buttons {
    margin-top: 30px;
}

.btn {
    padding: 15px 25px;
    margin-right: 10px;
    cursor: pointer;
}

.primary {
    background: #00ff9f;
    color: black;
}

.secondary {
    border: 1px solid #00ff9f;
    color: #00ff9f;
    background: transparent;
}

/* IMAGE */
.profile {
    margin-top: 40px;
    text-align: center;
}

.profile img {
    width: 150px;
    border-radius: 50%;
    border: 2px solid #00ff9f;
    box-shadow: 0 0 20px #00ff9f;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">AAM_</div>
    <div class="lang">
        <button>FR</button>
        <button>EN</button>
    </div>
</div>

<!-- HERO -->
<div class="hero">

    <p>// AVAILABLE FOR OPPORTUNITIES</p>

    <h1>
        Hi, I'm <br>
        <span class="highlight">Haroum Abdoulkader</span><br>
        <span class="white">AI Engineer.</span>
    </h1>

    <p class="desc">
        AI Engineer & Developer<br>
        Specializing in AI, Machine Learning & Data Science<br>
        Based in Djibouti – Open to work
    </p>

    <div class="buttons">
        <button class="btn primary">VIEW PROJECTS</button>
        <button class="btn secondary">GET IN TOUCH</button>
    </div>

    <div class="profile">
        <img src="d750c891-f83e-4567-a22f-fa1bd6e1d724.jpg">
    </div>

</div>

</body>
</html>
