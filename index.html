<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Portfolio</title>

<style>
body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: #020617;
    color: #00bfff; /* BLUE */
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    border-bottom: 1px solid #00bfff;
    align-items: center;
}

.logo { font-weight: bold; }

.right-menu {
    display: flex;
    align-items: center;
}

.lang button {
    background: transparent;
    border: 1px solid #00bfff;
    color: #00bfff;
    margin-right: 10px;
    padding: 5px 10px;
}

.menu-btn {
    font-size: 30px;
    cursor: pointer;
}

.dropdown {
    position: absolute;
    top: 70px;
    right: 20px;
    background: #020617;
    border: 1px solid #00bfff;
    display: none;
    flex-direction: column;
}

.dropdown a {
    padding: 10px 20px;
    cursor: pointer;
}

.dropdown a:hover {
    background: #00bfff;
    color: black;
}

.hero {
    padding: 20px;
    height: 100vh;

    background-image: linear-gradient(#00bfff22 1px, transparent 1px),
                      linear-gradient(90deg, #00bfff22 1px, transparent 1px);
    background-size: 40px 40px;
}

/* BIG MOBILE TEXT LIKE IMAGE */
h1 {
    font-size: 12vw;
    line-height: 1.05;
}

.highlight { color: #00bfff; }
.white { color: white; }

.desc {
    color: #94a3b8;
    margin-top: 20px;
    font-size: 4vw;
}

.buttons {
    margin-top: 30px;
}

.btn {
    padding: 15px 25px;
    margin-right: 10px;
    cursor: pointer;
    font-size: 3.5vw;
}

.primary {
    background: #00bfff;
    color: black;
}

.secondary {
    border: 1px solid #00bfff;
    color: #00bfff;
    background: transparent;
}

.profile {
    margin-top: 50px;
}

.profile img {
    width: 150px;
    border-radius: 50%;
    border: 2px solid #00bfff;
    box-shadow: 0 0 20px #00bfff;
}

/* DESKTOP FIX */
@media(min-width: 768px) {
    h1 { font-size: 90px; }
    .desc { font-size: 18px; }
    .btn { font-size: 16px; }
}

</style>

<script>
function toggleMenu() {
    let menu = document.getElementById("dropdown");
    menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}

function scrollToSection(id) {
    document.getElementById(id).scrollIntoView({ behavior: "smooth" });
}
</script>

</head>

<body>

<div class="navbar">
    <div class="logo">AAM_</div>

    <div class="right-menu">
        <div class="lang">
            <button>FR</button>
            <button>EN</button>
        </div>

        <div class="menu-btn" onclick="toggleMenu()">⋮</div>
    </div>
</div>

<div id="dropdown" class="dropdown">
    <a onclick="scrollToSection('about')">About</a>
    <a onclick="scrollToSection('skills')">Skills</a>
    <a onclick="scrollToSection('projects')">Projects</a>
    <a onclick="scrollToSection('contact')">Contact</a>
</div>

<div class="hero">

    <p>// AVAILABLE FOR OPPORTUNITIES</p>

    <h1>
        Hi, I'm <br>
        <span class="highlight">Haroum Abdoulkader</span><br>
        <span class="white">AI Engineer.</span>
    </h1>

    <p class="desc">
        AI Engineer & Developer<br>
        Specializing in AI, Machine Learning<br>
        Based in Djibouti – Open to work
    </p>

    <div class="buttons">
        <button class="btn primary">Resume</button>
        <button class="btn secondary">Get In Touch</button>
    </div>

    <div class="profile">
        <img src="d750c891-f83e-4567-a22f-fa1bd6e1d724.jpg">
    </div>

</div>

</body>
</html>
