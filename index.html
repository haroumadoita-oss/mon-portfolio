<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Pro</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: flex-end;
            padding: 20px 50px;
            background: rgba(0,0,0,0.5);
        }

        .menu a {
            margin: 0 10px;
            cursor: pointer;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .page {
            display: none;
            padding: 80px 100px;
        }

        .active {
            display: block;
        }

        .home-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 80vh;
        }

        .left {
            max-width: 50%;
        }

        .right {
            text-align: center;
        }

        .right img {
            width: 260px;
            border-radius: 50%;
            box-shadow: 0 0 20px #3b82f6;
        }

        h1 {
            font-size: 60px;
        }

        h1 span {
            color: #3b82f6;
        }

        .name {
            margin-top: 10px;
            font-size: 20px;
        }

        #desc {
            color: #94a3b8;
            line-height: 1.6;
            font-size: 18px;
        }

        /* CONTACT FORM */
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: none;
        }

        textarea {
            height: 120px;
        }

        .whatsapp {
            background: #25D366;
            margin-top: 10px;
        }
    </style>

    <script>
        function showPage(pageId) {
            let pages = document.getElementsByClassName("page");
            for (let i = 0; i < pages.length; i++) {
                pages[i].classList.remove("active");
            }
            document.getElementById(pageId).classList.add("active");
        }

        function setLanguage(lang) {
            if (lang === 'fr') {
                document.getElementById('homeBtn').innerText = "Accueil";
                document.getElementById('aboutBtn').innerText = "À propos";
                document.getElementById('skillsBtn').innerText = "Compétences";
                document.getElementById('projectsBtn').innerText = "Projets";
                document.getElementById('contactBtn').innerText = "Contact";

                document.getElementById('title').innerHTML = "Ingénieur <span>IA</span>";

                document.getElementById('desc').innerHTML =
                "Création de solutions intelligentes et systèmes basés sur l'IA.<br>Spécialisé en Machine Learning, Data Science et technologies modernes.";

                document.getElementById('workBtn').innerText = "Travailler avec moi";
                document.getElementById('resumeBtn').innerText = "CV";

                document.getElementById('contactTitle').innerText = "Envoyer un message";
                document.getElementById('nameInput').placeholder = "Votre nom";
                document.getElementById('emailInput').placeholder = "Votre email";
                document.getElementById('subjectInput').placeholder = "Sujet";
                document.getElementById('messageInput').placeholder = "Votre message";
                document.getElementById('sendBtn').innerText = "Envoyer";

            } else {
                document.getElementById('homeBtn').innerText = "Home";
                document.getElementById('aboutBtn').innerText = "About";
                document.getElementById('skillsBtn').innerText = "Skills";
                document.getElementById('projectsBtn').innerText = "Projects";
                document.getElementById('contactBtn').innerText = "Contact";

                document.getElementById('title').innerHTML = "AI <span>Engineer</span>";

                document.getElementById('desc').innerHTML =
                "Building intelligent systems and AI-powered solutions.<br>Specialized in Machine Learning, Data Science, and modern technologies.";

                document.getElementById('workBtn').innerText = "Work With Me";
                document.getElementById('resumeBtn').innerText = "Resume";

                document.getElementById('contactTitle').innerText = "Send Message";
                document.getElementById('nameInput').placeholder = "Your Name";
                document.getElementById('emailInput').placeholder = "Your Email";
                document.getElementById('subjectInput').placeholder = "Subject";
                document.getElementById('messageInput').placeholder = "Your Message";
                document.getElementById('sendBtn').innerText = "Send";
            }
        }

        window.onload = function() {
            showPage('home');
        }
    </script>

</head>
<body>

<div class="navbar">

    <div class="menu">
        <a onclick="showPage('home')" id="homeBtn">Home</a>
        <a onclick="showPage('about')" id="aboutBtn">About</a>
        <a onclick="showPage('skills')" id="skillsBtn">Skills</a>
        <a onclick="showPage('projects')" id="projectsBtn">Projects</a>
        <a onclick="showPage('contact')" id="contactBtn">Contact</a>
    </div>

    <div style="margin-left:20px;">
        <button onclick="setLanguage('fr')">FR</button>
        <button onclick="setLanguage('en')">EN</button>
    </div>

</div>

<!-- HOME -->
<div id="home" class="page">
    <div class="home-container">

        <div class="left">
            <h1 id="title">AI <span>Engineer</span></h1>

            <p id="desc">
                Building intelligent systems and AI-powered solutions.<br>
                Specialized in Machine Learning, Data Science, and modern technologies.
            </p>

            <p>📍 Djibouti</p>

            <br>
            <button id="workBtn">Work With Me</button>
            <button id="resumeBtn">Resume</button>
        </div>

        <div class="right">
            <img src="d750c891-f83e-4567-a22f-fa1bd6e1d724.jpg">
            <h3 class="name">Haroum Abdoulkader</h3>
        </div>

    </div>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
    <h2 id="contactTitle">Send Message</h2>

    <input type="text" id="nameInput" placeholder="Your Name">
    <input type="email" id="emailInput" placeholder="Your Email">
    <input type="text" id="subjectInput" placeholder="Subject">
    <textarea id="messageInput" placeholder="Your Message"></textarea>

    <button id="sendBtn">Send</button>

    <br><br>

    <!-- WHATSAPP -->
    <a href="https://wa.me/253XXXXXXXX" target="_blank">
        <button class="whatsapp">WhatsApp</button>
    </a>

    <p>📍 Djibouti</p>
</div>

</body>
</html>
