<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: #020617;
    color: #00ff9f;
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    border-bottom: 1px solid #00ff9f;
}

.logo {
    font-size: 20px;
}

.menu-btn {
    font-size: 30px;
}

.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 20px;

    background-image: linear-gradient(#00ff9f22 1px, transparent 1px),
                      linear-gradient(90deg, #00ff9f22 1px, transparent 1px);
    background-size: 40px 40px;
}

/* RESPONSIVE BIG TEXT */
h1 {
    font-size: 12vw; /* MAGIC LINE */
    line-height: 1.05;
}

.highlight { color: #00ff9f; }
.white { color: white; }

.desc {
    color: #94a3b8;
    margin-top: 20px;
    font-size: 4vw;
}

.buttons {
    margin-top: 25px;
    display: flex;
    gap: 10px;
}

.btn {
    padding: 12px 18px;
    font-size: 3.5vw;
}

.primary {
    background: #00ff9f;
    color: black;
}

.secondary {
    border: 1px solid #00ff9f;
    color: #00ff9f;
    background: transparent;
}

/* TABLET / DESKTOP */
@media(min-width: 768px) {
    h1 { font-size: 90px; }
    .desc { font-size: 18px; }
    .btn { font-size: 16px; }
}

</style>

</head>

<body>

<div class="navbar">
    <div class="logo">AAM_</div>
    <div class="menu-btn">⋮</div>
</div>

<div class="hero">

    <p>// AVAILABLE FOR OPPORTUNITIES</p>

    <h1>
        Hi, I'm <br>
        <span class="highlight">Haroum</span><br>
        <span class="white">Abdoulkader</span>
    </h1>

    <p class="desc">
        AI Engineer & Developer<br>
        AI / ML Specialist
    </p>

    <div class="buttons">
        <button class="btn primary">VIEW PROJECTS</button>
        <button class="btn secondary">CONTACT</button>
    </div>

</div>

</body>
</html>
